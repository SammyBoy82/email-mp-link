      body: `Dear Ms Mary Doyle MP,

Re: Community Safety and Compliance Concerns Regarding Recent Gatherings
 
I write to you as a Victorian constituent to formally raise serious concerns regarding recent public gatherings in Melbourne described as mourning events for senior leadership of the Islamic Republic of Iran.

This correspondence does not question lawful religious belief or peaceful private observance. Rather, it concerns the potential national security and foreign interference implications where public events appear politically aligned with a regime whose military arm the Islamic Revolutionary Guard Corps (IRGC) has been designated as a terrorist organisation by several of Australia’s closest democratic allies and remains subject to extensive international sanctions.

The IRGC has been widely linked to extraterritorial operations, repression of dissidents, and destabilising activities. In this context, public gatherings that risk legitimising, normalising, or symbolically endorsing figures exercising command authority over such an entity raise legitimate questions under:
 • The Criminal Code Act 1995 (Cth) (terrorism-related provisions);
 • The Foreign Influence Transparency Scheme Act 2018 (Cth);
 • Australia’s broader foreign interference and national security framework.

Recent years have also seen Australian authorities publicly address concerns regarding foreign interference and activities connected to actors associated with the Iranian regime. This background heightens community sensitivity and reinforces the need for vigilance.

Many Iranian-Australians in my community are survivors of political persecution and forced displacement. Events that appear to publicly honour leadership linked to sanctioned or terrorist-designated entities create not only distress but also a perceived risk of intimidation or emboldenment of regime-aligned actors within Australia.

In light of these considerations, I respectfully seek clarification on the following:
 • Whether relevant federal agencies are assessing any foreign interference or national security risks associated with such gatherings;
 • What safeguards are in place to ensure compliance with Commonwealth counter-terrorism and foreign influence legislation;
 • The Government’s current position regarding the IRGC and any consideration of formal designation within Australia’s terrorist listing framework.

Australia’s democratic freedoms are foundational. However, those freedoms coexist with a clear responsibility to protect national security, uphold counter-terrorism law, and ensure that foreign regime influence does not take root within Australian civic space.

Given the seriousness of the issue, I would appreciate confirmation that appropriate oversight mechanisms are engaged.

Thank you for your attention to this matter.

As you are aware, Ayatollah Khamenei served as the Supreme Leader of Iran and Commander-in-Chief of its armed forces, including the Islamic Revolutionary Guard Corps (IRGC), which is listed as a terrorist organisation under Australian law.

We fully respect Australia’s commitment to freedom of religion and peaceful assembly. Our concern is not with lawful religious observance. However, given the current heightened international situation and strong emotions within the Iranian diaspora, there is genuine concern about the potential for rhetoric at such gatherings to cross into the glorification of institutions associated with a listed organisation, or to inflame tensions during an already sensitive period.

•	A reported confrontation at Monash University;
•	An incident in suburban streets around Doncaster;
•	A case involving a landlord allegedly intimidating a tenant in relation to political views surrounding recent events.

While these incidents may be isolated, together they have contributed to a growing sense of vulnerability within parts of the Iranian-Australian community.

Many Iranian Australians are now concerned about exercising their lawful right to free expression without fear of confrontation, intimidation, or retaliation in their workplaces, universities, or housing situations.

Given Australia’s experience in carefully managing sensitive community tensions, it is important that all public gatherings — of any kind — remain peaceful, compliant with Australian law, and free from incitement or hate speech.

For many in the diaspora, recent events have also resurfaced deep psychological trauma. Large numbers of Iranian Australians have lived through repression, imprisonment, loss of loved ones, or forced displacement under the rule of this regime. Public expressions of relief following his death reflect, for many, a sense of personal closure rather than hostility toward any religious community.

In light of the current climate, we respectfully request that relevant authorities:
•	Ensure all gatherings remain fully compliant with Australian law;
•	Guard against any material support or advocacy for a listed terrorist organisation;
•	Consider appropriate risk assessment and visibility measures where deemed necessary to safeguard public safety;
•	Ensure that all members of the community can exercise their democratic rights without fear of intimidation.

Our intention is not to restrict lawful religious practice, but to ensure that Australian law is upheld and that community cohesion and public safety are maintained during this sensitive period.

Thank you for your attention to this matter.

Sincerely,
`
