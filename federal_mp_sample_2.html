      to: "mary.doyle.mp@aph.gov.au",
      cc: "meliran.australia@gmail.com",
      subject: "Community Safety and Compliance Concerns Regarding Recent Gatherings",
      body: `Dear Ms Mary Doyle MP,

 write to you as a Victorian constituent to formally raise serious concerns regarding recent public gatherings in Melbourne described as mourning events for senior leadership of the Islamic Republic of Iran.

This correspondence does not question lawful religious belief or peaceful private observance. Rather, it concerns the potential national security and foreign interference implications where public events appear politically aligned with a regime whose military arm the Islamic Revolutionary Guard Corps (IRGC) has been designated as a terrorist organisation by several of Australia’s closest democratic allies and remains subject to extensive international sanctions.

The IRGC has been widely linked to extraterritorial operations, repression of dissidents, and destabilising activities. In this context, public gatherings that risk legitimising, normalising, or symbolically endorsing figures exercising command authority over such an entity raise legitimate questions under:
 • The Criminal Code Act 1995 (Cth) (terrorism-related provisions);
 • The Foreign Influence Transparency Scheme Act 2018 (Cth);
 • Australia’s broader foreign interference and national security framework.

Recent years have also seen Australian authorities publicly address concerns regarding foreign interference and activities connected to actors associated with the Iranian regime. This background heightens community sensitivity and reinforces the need for vigilance.

Many Iranian-Australians in my community are survivors of political persecution and forced displacement. Events that appear to publicly honour leadership linked to sanctioned or terrorist-designated entities create not only distress but also a perceived risk of intimidation or emboldenment of regime-aligned actors within Australia.

In light of these considerations, I respectfully seek clarification on the following:
 • Whether relevant federal agencies are assessing any foreign interference or national security risks associated with such gatherings;
 • What safeguards are in place to ensure compliance with Commonwealth counter-terrorism and foreign influence legislation;
 • The Government’s current position regarding the IRGC and any consideration of formal designation within Australia’s terrorist listing framework.

Australia’s democratic freedoms are foundational. However, those freedoms coexist with a clear responsibility to protect national security, uphold counter-terrorism law, and ensure that foreign regime influence does not take root within Australian civic space.

Given the seriousness of the issue, I would appreciate confirmation that appropriate oversight mechanisms are engaged.

Thank you for your attention to this matter.`
