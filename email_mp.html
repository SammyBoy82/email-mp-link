<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Email MP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<script>
  (function() {
      const to = "samh@byte.com.au";
      const subject = "subject is here";
      const body = "Body 1 is here";

      const mailtoLink =
          "mailto:" + to +
          "?subject=" + encodeURIComponent(subject) +
          "&body=" + encodeURIComponent(body);

      // Fallback link
      document.write('<p>If email did not open automatically click below:</p>');
      document.write('<a href="' + mailtoLink + '">Open Email</a>');

      // Redirect AFTER page loads
      window.location.href = mailtoLink;
  })();
</script>

</body>
</html>
