<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Email MP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      max-width: 600px;
      margin: auto;
    }
    h2 {
      margin-top: 0;
    }
    .button {
      display: inline-block;
      padding: 14px 22px;
      margin-top: 15px;
      background: #2b7cff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
    }
    .info {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.7;
      word-break: break-word;
    }
    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>Open Your Email</h2>
  <p>Tap the button below to open your email client:</p>

  <a id="openBtn" class="button" href="#">📧 Open Email</a>

  <div id="info" class="info"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const zone = (params.get("zone") || "").toUpperCase().trim();
  const name = (params.get("name") || "").trim();

  // =============================
  // ELECTORATE PROFILES
  // =============================
  const profiles = {

    "ASTON": {
      to: "mary.doyle.mp@aph.gov.au",
      cc: "meliiran@gmail.com",
      subject: "Community Safety and Compliance Concerns Regarding Recent Gatherings",
      body: `Dear Ms Mary Doyle MP,

recent memorial gatherings held in Australia following the death of Ayatollah Ali Khamenei.

As you are aware, Ayatollah Khamenei served as the Supreme Leader of Iran and Commander-in-Chief of its armed forces, including the Islamic Revolutionary Guard Corps (IRGC), which is listed as a terrorist organisation under Australian law.

We fully respect Australia’s commitment to freedom of religion and peaceful assembly. Our concern is not with lawful religious observance. However, given the current heightened international situation and strong emotions within the Iranian diaspora, there is genuine concern about the potential for rhetoric at such gatherings to cross into the glorification of institutions associated with a listed organisation, or to inflame tensions during an already sensitive period.

In recent days, members of our community have reported incidents of harassment and intimidation linked to escalating political tensions.

Given Australia’s experience in carefully managing sensitive community tensions, it is important that all public gatherings remain peaceful and compliant with Australian law.

In light of the current climate, we respectfully request that relevant authorities ensure compliance with Australian law and safeguard public safety.

Our intention is not to restrict lawful religious practice, but to ensure that Australian law is upheld and that community cohesion and public safety are maintained during this sensitive period.

Thank you for your attention to this matter.`
    }

    // 👉 Add other electorates here following same structure
  };

  const profile = profiles[zone];

  if (!profile) {
    document.getElementById("openBtn").style.display = "none";
    document.getElementById("info").innerHTML =
      `<div class="error">Electorate not configured: ${zone || "(empty)"}</div>`;
    throw new Error("Electorate not configured");
  }

  const to = String(profile.to || "").trim();
  const cc = String(profile.cc || "").trim();
  const subject = String(profile.subject || "");
  const signature = name ? `\n\nKind regards,\n${name}\n` : `\n\nKind regards,\n`;
  const finalBody = String(profile.body || "") + signature;

  // =============================
  // ANDROID-SAFE MAILTO FORMAT
  // =============================
  const mailto =
    "mailto:?to=" + encodeURIComponent(to) +
    (cc ? "&cc=" + encodeURIComponent(cc) : "") +
    "&subject=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(finalBody);

  document.getElementById("openBtn").href = mailto;

  // Optional info display (remove if not needed)
  document.getElementById("info").innerText =
    "Electorate: " + zone +
    "\nRecipient: " + to +
    (cc ? "\nCC: " + cc : "") +
    (name ? "\nFrom: " + name : "");
</script>

</body>
</html>
