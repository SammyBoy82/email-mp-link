      to: "mary.doyle.mp@aph.gov.au",
      cc: "meliran.australia@gmail.com",
      subject: "Community Safety and Compliance Concerns Regarding Recent Gatherings",
      body: `Dear Ms Mary Doyle MP,

I write as a Victorian constituent to raise serious national security and foreign influence concerns arising from two converging developments: escalating Iranian military activity affecting Australian interests abroad, and public gatherings in Melbourne commemorating senior leadership of the Iranian regime.

As recently reported by the ABC, an air base near Dubai used by Australian Defence Force personnel was targeted by Iranian drone strikes. While Defence Minister Richard Marles confirmed that all ADF personnel were safe, the incident underscores a critical point: Iran’s military posture is actively impacting Australian assets and personnel. This is no longer a distant geopolitical matter it has direct relevance to Australian national security.

Ayatollah Ali Khamenei served as Supreme Leader of Iran and Commander-in-Chief of its armed forces, including the Islamic Revolutionary Guard Corps (IRGC). The IRGC has been designated as a terrorist organisation by several of Australia’s closest democratic allies and remains subject to extensive international sanctions due to its involvement in terrorism-linked operations, proxy warfare, and repression of dissent.

In this context, public gatherings within Australia that commemorate or symbolically honour figures exercising command authority over such an entity raise legitimate and serious concerns.

These concerns fall into three categories:

1. National Security Risk
When Australian personnel are being placed at risk by Iranian military activity, any domestic activity that appears to legitimise or normalise regime leadership warrants heightened scrutiny.

2. Foreign Interference and Compliance
Australia’s legislative framework including the Criminal Code Act 1995 (Cth) and the Foreign Influence Transparency Scheme Act 2018 (Cth) — exists precisely to prevent the spread of foreign regime influence, material support, or advocacy connected to hostile state actors. It is essential that this framework is applied consistently and without ambiguity.

3. Community Safety and Social Cohesion
Many Iranian-Australians are survivors of political repression. Public events that appear to endorse regime leadership, particularly during active hostilities involving Australian defence assets, create distress and raise concerns about intimidation or emboldenment of regime-aligned actors within diaspora communities.

This correspondence does not challenge lawful religious observance. It does, however, raise the question of whether the current circumstances including the recent strike affecting ADF-associated facilities demand a firmer and more visible application of Australia’s national security safeguards.

I respectfully request your assurance that:
 • Relevant federal agencies are actively assessing any national security or foreign interference implications;
 • Compliance with Commonwealth counter-terrorism legislation is being monitored;
 • The Government’s position regarding the IRGC and associated influence activities remains clear and robust.

Given the evolving security landscape, these issues warrant decisive attention at the federal level.

Thank you for your consideration of this matter.

Yours sincerely,`
